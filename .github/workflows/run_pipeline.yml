name: Relationship Shorts Pipeline

on:
  schedule:
    - cron: '0 16 * * 1'  # Monday 12:00 PM New York during EDT
    - cron: '0 23 * * 1'  # Monday 7:00 PM New York during EDT
    - cron: '0 16 * * 2'  # Tuesday 12:00 PM New York during EDT
    - cron: '0 0 * * 3'   # Tuesday 8:00 PM New York during EDT
    - cron: '0 15 * * 3'  # Wednesday 11:00 AM New York during EDT
    - cron: '0 23 * * 3'  # Wednesday 7:00 PM New York during EDT
    - cron: '0 16 * * 4'  # Thursday 12:00 PM New York during EDT
    - cron: '0 0 * * 5'   # Thursday 8:00 PM New York during EDT
    - cron: '0 19 * * 5'  # Friday 3:00 PM New York during EDT
    - cron: '0 23 * * 5'  # Friday 7:00 PM New York during EDT
    - cron: '0 14 * * 6'  # Saturday 10:00 AM New York during EDT
    - cron: '0 22 * * 6'  # Saturday 6:00 PM New York during EDT
    - cron: '0 15 * * 0'  # Sunday 11:00 AM New York during EDT
    - cron: '0 23 * * 0'  # Sunday 7:00 PM New York during EDT
  workflow_dispatch:
    inputs:
      upload:
        description: 'Upload to YouTube. Keep false until OAuth is verified for Soft Reset With Me.'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate configured schedule
        run: python tools/validate_schedule.py

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        timeout-minutes: 35
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.upload }}" != "true" ]; then
            python main.py --fresh --skip-upload
          else
            python main.py --fresh
          fi
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          POLLINATIONS_API_KEY:      ${{ secrets.POLLINATIONS_API_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          COVERR_API_KEY:            ${{ secrets.COVERR_API_KEY }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ALERT_EMAIL_FROM:          ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO:            ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_PASSWORD:      ${{ secrets.ALERT_EMAIL_PASSWORD }}

      - name: Upload rendered video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: soft-reset-render-${{ github.run_id }}
          path: |
            workspace/run_*/06_final_video.mp4
            workspace/run_*/00_performance_sync.json
            workspace/run_*/05_thumbnail.png
            workspace/run_*/07_metadata.json
            workspace/run_*/02_script.json
            workspace/run_*/03_asset_meta.json
            workspace/run_*/06_render_meta.json
          if-no-files-found: warn
          retention-days: 7

      - name: Commit learning memory
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_memory_soft_reset.json performance_memory_soft_reset.json
          git diff --staged --quiet || git commit -m "chore: log video $(date +%Y%m%d_%H%M%S)"
          git push

      - name: Cleanup workspace
        if: always()
        run: python -c "import shutil; shutil.rmtree('workspace/', ignore_errors=True)"
