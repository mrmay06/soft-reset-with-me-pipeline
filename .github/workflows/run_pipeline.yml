name: Finance Shorts Pipeline

on:
  schedule:
    - cron: '45 11 * * *'  # 7:45 AM ET → post at 8:00 AM ET
    - cron: '45 15 * * *'  # 11:45 AM ET → post at 12:00 PM ET
    - cron: '45 20 * * *'  # 4:45 PM ET → post at 5:00 PM ET
    - cron: '45 0 * * *'   # 8:45 PM ET → post at 9:00 PM ET
    # Note: times use EDT (UTC-4). Shifts 1hr earlier in EST (Nov–Mar).
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate configured schedule
        run: python tools/validate_schedule.py

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        id: pipeline
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 20
          max_attempts: 2
          retry_wait_seconds: 300
          command: python main.py --fresh
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          POLLINATIONS_API_KEY:      ${{ secrets.POLLINATIONS_API_KEY }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:     ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          ALERT_EMAIL_FROM:          ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_TO:            ${{ secrets.ALERT_EMAIL_TO }}
          ALERT_EMAIL_PASSWORD:      ${{ secrets.ALERT_EMAIL_PASSWORD }}

      - name: Commit topic memory
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_memory.json
          git diff --staged --quiet || git commit -m "chore: log video $(date +%Y%m%d_%H%M%S)"
          git push

      - name: Cleanup workspace
        if: always()
        run: python -c "import shutil; shutil.rmtree('workspace/', ignore_errors=True)"
